hostname R4

interface GigabitEthernet2/0
 description Link to R3
 ip address 10.0.6.2 255.255.255.252

interface FastEthernet3/0
 description Link to R7
 ip address 10.0.10.2 255.255.255.252

interface FastEthernet3/1
 description Link to R8
 ip address 10.0.12.2 255.255.255.252

interface FastEthernet4/0
 description Link to R5
 ip address 10.0.4.2 255.255.255.252

interface FastEthernet4/1
 description Link to R6
 ip address 10.0.8.2 255.255.255.252

interface FastEthernet5/0
 description Link to R2
 ip address 10.0.13.2 255.255.255.252

router ospf 1
 router-id 1.1.1.5
 network 10.0.4.0 0.0.0.3 area 0
 network 10.0.6.0 0.0.0.3 area 0
 network 10.0.8.0 0.0.0.3 area 0
 network 10.0.10.0 0.0.0.3 area 0
 network 10.0.12.0 0.0.0.3 area 0
 network 10.0.13.0 0.0.0.3 area 0

snmp-server community public RO
snmp-server location GNS3-Lab
snmp-server contact netman
snmp-server enable traps entity-sensor threshold